<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bookr — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #ECEBEC; }
  * { box-sizing: border-box; }
  body { -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: rgba(150,147,155,0.4); border-radius: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  input::placeholder, textarea::placeholder { color: #B6B2BB; }
  @keyframes bookrEq { 0%, 100% { transform: scaleY(0.32); } 50% { transform: scaleY(1); } }
  @keyframes bookrPing { 0% { transform: scale(1); opacity: 0.55; } 70%, 100% { transform: scale(2.2); opacity: 0; } }
  @keyframes bookrPulse { 0% { box-shadow: 0 0 0 0 rgba(252,129,74,0.5); } 70%, 100% { box-shadow: 0 0 0 12px rgba(252,129,74,0); } }
  @keyframes bookrBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="directions/tokens.jsx"></script>
<script type="text/babel" src="dashboard/tweaks-panel.jsx"></script>
<script type="text/babel" src="dashboard/data.jsx"></script>
<script type="text/babel" src="dashboard/primitives.jsx"></script>
<script type="text/babel" src="dashboard/overview.jsx"></script>
<script type="text/babel" src="dashboard/calls.jsx"></script>
<script type="text/babel" src="dashboard/watch.jsx"></script>
<script type="text/babel" src="dashboard/app.jsx"></script>

<script type="text/babel">
  ReactDOM.createRoot(document.getElementById('root')).render(<window.DashApp />);
</script>
</body>
</html>
